# Demo configuration showing the `tags:` block on receivers + a resourceprocessor
# that promotes those tags to resource attributes.
#
# Flow:
#   1. `tags:` on a receiver injects key/value pairs into context.Context via
#      client.Info.Metadata under a "tags." prefix (e.g. "tags.env").
#   2. The `resource` processor reads them out with `from_context: tags.<key>`
#      and upserts them as resource attributes on every telemetry item.
#
# Observe the debug exporter output: each metric/log/span should show env,
# team, and receiver.type as resource attributes.
#
# To send test data:
#   Metrics/Logs/Traces via OTLP gRPC: otelcol-contrib or any SDK -> localhost:4317

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "localhost:4317"
      http:
        endpoint: "localhost:4318"
    tags:
      env: dev
      team: platform
      receiver.type: otlp

  nop:
    tags:
      env: dev
      team: platform
      receiver.type: nop

processors:
  resource:
    attributes:
      - action: upsert
        key: env
        from_context: tags.env
      - action: upsert
        key: team
        from_context: tags.team
      - action: upsert
        key: receiver.type
        from_context: tags.receiver.type

exporters:
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [resource]
      exporters: [debug]
    logs:
      receivers: [otlp, nop]
      processors: [resource]
      exporters: [debug]
