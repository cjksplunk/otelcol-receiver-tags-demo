# Demo configuration showing the `tags:` block on receivers + two processors
# that independently consume the same context values.
#
# Flow:
#   1. `tags:` on a receiver injects key/value pairs into context.Context via
#      client.Info.Metadata under a "tags." prefix (e.g. "tags.connection_name").
#   2. The `resource` processor promotes two tags to resource attributes under
#      different names: connection_name -> region, instance -> service.name.
#   3. The `attributes` processor reads the same two tags from context and
#      writes them under completely different names as log attributes:
#      connection_name -> source.id, instance -> collector.node.
#
# Observe the debug exporter output: resource attributes show region and
# service.name; log attributes show source.id and collector.node.
#
# To send test data:
#   Logs via OTLP gRPC: telemetrygen or any SDK -> localhost:4317, 4327, 4337

receivers:
  otlp/prod-us-east:
    protocols:
      grpc:
        endpoint: "localhost:4317"
      http:
        endpoint: "localhost:4318"
    tags:
      connection_name: prod-us-east
      instance: collector-1
      owner: platform

  otlp/staging-eu-west:
    protocols:
      grpc:
        endpoint: "localhost:4327"
      http:
        endpoint: "localhost:4328"
    tags:
      connection_name: staging-eu-west
      instance: collector-2
      owner: backend

  otlp/dev-local:
    protocols:
      grpc:
        endpoint: "localhost:4337"
      http:
        endpoint: "localhost:4338"
    tags:
      connection_name: dev-local
      instance: collector-3
      owner: frontend


processors:
  resource:
    attributes:
      - action: upsert
        key: region
        from_context: tags.connection_name
      - action: upsert
        key: service.name
        from_context: tags.instance

  attributes:
    actions:
      - action: upsert
        key: source.id
        from_context: tags.connection_name
      - action: upsert
        key: collector.node
        from_context: tags.instance

exporters:
  debug:
    verbosity: detailed

service:
  pipelines:
    logs:
      receivers: [otlp/prod-us-east, otlp/staging-eu-west, otlp/dev-local]
      processors: [resource, attributes]
      exporters: [debug]
